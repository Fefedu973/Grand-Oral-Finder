x-runtime-defaults: &runtime-defaults
  init: true
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"
  networks:
    - dokploy-network

services:
  web:
    <<: *runtime-defaults
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:?NEXT_PUBLIC_SERVER_URL is required}
    environment:
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:?NEXT_PUBLIC_SERVER_URL is required}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3001"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    tmpfs:
      - /tmp:size=32m,mode=1777

  api:
    <<: *runtime-defaults
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      IP_HASH_SECRET: ${IP_HASH_SECRET:?IP_HASH_SECRET is required}
      NODE_ENV: production
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    tmpfs:
      - /tmp:size=32m,mode=1777

networks:
  dokploy-network:
    external: true
